<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Hero Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            flex-direction: column;
        }
        .container {
            width: 100%;
            max-width: 1600px;
            padding: 40px;
            box-sizing: border-box;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 600;
        }
        .badge {
            background: rgba(32, 227, 178, 0.1);
            color: #20E3B2;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
        }
        .instructions {
            margin-top: 30px;
            color: #94A3B8;
            font-size: 15px;
            line-height: 1.6;
            max-width: 800px;
            text-align: center;
        }
        code {
            background: #1e293b;
            padding: 2px 6px;
            border-radius: 4px;
            color: #00D4FF;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <img src="hero.svg" alt="GitHub Profile Hero Preview">

        
    </div>
</body>
</html>
